    <div class="container">

        <form class="contact-form" method="POST">

            <h2>Have A Question? Get In Touch</h2>

            <label for="first_name">First Name</label><br>
            <input class="contact-form-box" type="text" id="first_name" name="first_name" required /><br><br>

            <label for="last_name">Last Name</label><br>
            <input class="contact-form-box" type="text" id="last_name" name="last_name" required /><br><br>

            <label for="email">Email Address</label><br>
            <input class="contact-form-box" type="email" id="email" name="email" required /><br><br>

            <label for="message">Message</label><br>
            <textarea class="contact-form-box" id="message" name="message" rows="6" cols="40" required></textarea><br><br>

            <input type="hidden" name="_replyto" value="agbarry1@asu.edu" />

            <button class="btn contact-form-box" type="submit">Send Message</button>

        </form>
